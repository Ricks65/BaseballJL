{% extends "league/base.html" %}

{% block content %}
<style>
    /* Estilos adaptados al protocolo de diseño de Penacony */
    .django-form-container p {
        margin-bottom: 1.25rem;
    }
    .django-form-container label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        color: rgba(251, 191, 36, 0.8); /* Oro text-amber-400 */
        margin-bottom: 0.35rem;
        letter-spacing: 0.1em;
    }
    .django-form-container input[type="text"],
    .django-form-container input[type="number"],
    .django-form-container select,
    .django-form-container textarea {
        width: 100%;
        padding: 0.625rem 1rem;
        border-radius: 0.375rem;
        background-color: #09090b; /* zinc-950 */
        border: 1px solid rgba(147, 51, 234, 0.3); /* Borde Púrpura sutil */
        outline: none;
        transition: all 0.2s;
        font-size: 0.875rem;
        color: #e7e5e4; /* text-stone-200 */
    }
    .django-form-container input:focus,
    .django-form-container select:focus,
    .django-form-container textarea:focus {
        border-color: #f59e0b; /* Dorado foco */
        box-shadow: 0 0 12px rgba(245, 158, 11, 0.25);
    }
    /* Estilización del elemento select generado por Django */
    .django-form-container select option {
        background-color: #18181b; /* zinc-900 */
        color: #e7e5e4;
    }
</style>

<section class="w-full my-8 max-w-xl mx-auto animate-fade-in px-4">
    
    <div class="bg-gradient-to-b from-zinc-900 to-black rounded-2xl shadow-[0_0_40px_rgba(168,85,247,0.15)] border-2 border-amber-400/30 overflow-hidden">
        
        <div class="bg-gradient-to-r from-purple-950/60 via-zinc-900 to-black px-6 py-6 border-b-2 border-amber-400/30 text-center relative">
            <div class="absolute -bottom-5 left-1/2 transform -translate-x-1/2 bg-gradient-to-tr from-amber-500 to-amber-600 text-zinc-950 w-10 h-10 rounded-full flex items-center justify-center shadow-[0_0_15px_rgba(251,191,36,0.4)] font-bold text-lg border border-amber-300">
                ✨
            </div>
            <h2 class="font-baseball text-xl text-stone-100 tracking-widest uppercase font-black">
                {% if form.instance.pk %}Actualizar Frecuencia del{% else %}Inscribir Nuevo{% endif %} jugador
            </h2>
            <p class="text-xs text-purple-400 uppercase tracking-[0.15em] mt-1 font-mono font-bold">Registro de la Armonía</p>
        </div>

        <div class="p-6 pt-10">
            <form method="post" class="django-form-container space-y-2">
                {% csrf_token %}
                
                <div class="bg-purple-950/10 p-5 rounded-xl border border-purple-900/30 mb-6 backdrop-blur-sm">
                    {{ form.as_p }}
                </div>
                
                <div class="flex flex-col sm:flex-row items-center gap-3 pt-2">
                    <button type="submit" class="w-full sm:flex-1 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-zinc-950 font-black py-3 px-6 rounded-lg shadow-[0_0_10px_rgba(251,191,36,0.2)] transition-all uppercase tracking-widest font-mono text-xs transform hover:-translate-y-0.5">
                        {% if form.instance.pk %}Sintonizar Cambios{% else %}Confirmar Registro 🔮{% endif %}
                    </button>
                    
                    <a href="{% url 'player_list' %}" class="w-full sm:w-auto text-center border border-purple-900/50 hover:border-purple-500 bg-zinc-950 hover:bg-purple-950/30 text-stone-400 hover:text-stone-200 font-bold py-3 px-6 rounded-lg transition-all uppercase tracking-widest font-mono text-xs">
                        Descartar
                    </a>
                </div>
            </form>
        </div>
        
    </div>
</section>
{% endblock %}
