{% extends 'league/base.html' %}

{% block content %}
<section class="container max-w-2xl mx-auto py-6 px-4 animate-fade-in space-y-6">
    
    <div class="page-header flex items-center justify-between border-b border-zinc-800 pb-5">
        <div>
            <h1 class="font-baseball text-2xl md:text-3xl tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-amber-400 via-stone-100 to-amber-500 font-black uppercase drop-shadow-[0_0_10px_rgba(251,191,36,0.15)]">
                {{ title }}
            </h1>
            <p class="text-[9px] text-purple-400 font-mono uppercase tracking-[0.2em] mt-1 font-bold">
                Ajuste de Líneas Temporales del Torneo
            </p>
        </div>
        
        <a href="{% url 'game_list' %}" class="btn-outline-dark border border-zinc-800 hover:border-purple-500/50 bg-zinc-950/40 hover:bg-purple-950/10 text-stone-400 hover:text-stone-200 font-mono text-xs font-bold uppercase tracking-widest px-4 py-2 rounded-xl transition-all">
            ⬅️ Back
        </a>
    </div>

    <div class="bg-gradient-to-b from-zinc-900/80 to-black/90 border border-purple-950/40 rounded-2xl p-6 md:p-8 shadow-2xl backdrop-blur-sm">
        {% include 'league/games/game_form_partial.html' %}
    </div>

</section>
{% endblock %}
