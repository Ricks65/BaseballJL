{% extends 'league/base.html' %}
{% block content %}

    <style>
        /* Consola de Control de Marcadores de Penacony */
        .match-form-wrapper p {
            margin-bottom: 1.25rem;
        }
        .match-form-wrapper label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(251, 191, 36, 0.8);
            margin-bottom: 0.35rem;
            letter-spacing: 0.1em;
        }
        .match-form-wrapper input[type="number"],
        .match-form-wrapper select {
            width: 100%;
            padding: 0.65rem 1rem;
            border-radius: 0.375rem;
            border: 1px solid rgba(147, 51, 234, 0.3);
            outline: none;
            transition: all 0.2s;
            font-size: 0.9rem;
            color: #e7e5e4;
            background-color: #09090b;
        }
        .match-form-wrapper input:focus,
        .match-form-wrapper select:focus {
            border-color: #f59e0b;
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.25);
        }
    </style>

<section class="max-w-xl mx-auto py-10 px-4 animate-fade-in">
    <div class="bg-gradient-to-b from-zinc-900 to-black rounded-2xl shadow-[0_0_40px_rgba(168,85,247,0.15)] border-2 border-amber-400/30 overflow-hidden">
        
        <div class="bg-gradient-to-r from-purple-950/60 via-zinc-900 to-black p-6 border-b-2 border-amber-400/30 text-center">
            <p class="text-[10px] text-amber-400 uppercase tracking-[0.2em] font-mono font-bold mb-2">Pizarra del Dictamen Onírico</p>
            
            <h2 class="font-mono font-black text-sm md:text-base tracking-wide flex items-center justify-center gap-3 flex-wrap text-stone-200 bg-black/40 p-3 rounded-xl border border-purple-950/60 shadow-inner">
                <span class="text-stone-100 font-bold">🔱 {% firstof form.instance.home_team form.initial.home_team "Local" %}</span> 
                <span class="text-[10px] bg-gradient-to-r from-amber-500 to-amber-600 px-2 py-0.5 rounded font-serif italic font-black text-zinc-950 shadow-[0_0_10px_rgba(251,191,36,0.3)]">VS</span> 
                <span class="text-stone-100 font-bold">🔮 {% firstof form.instance.away_team form.initial.away_team "Visitante" %}</span>
            </h2>
        </div>
        
        <div class="p-6">
            <form method="post" class="match-form-wrapper">
                {% csrf_token %}
                
                <div class="bg-purple-950/10 p-5 rounded-xl border border-purple-900/30 mb-6 backdrop-blur-sm">
                    {{ form.as_p }}
                </div>
                
                <div class="flex flex-col sm:flex-row items-center gap-3">
                    <button type="submit" class="w-full sm:flex-grow bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-400 hover:to-emerald-500 text-zinc-950 px-5 py-3 rounded-lg font-mono font-black uppercase tracking-widest text-xs transition-all transform hover:-translate-y-0.5 shadow-[0_0_15px_rgba(16,185,129,0.2)] border border-emerald-400">
                        Sellar Marcador ✅
                    </button>
                    <a href="{% url 'match_list' %}" class="w-full sm:w-auto text-center border border-purple-900/60 bg-zinc-950 hover:bg-purple-950/20 text-stone-400 hover:text-stone-200 px-6 py-3 rounded-lg font-mono font-bold uppercase tracking-widest text-xs transition-all">
                        Regresar
                    </a>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
